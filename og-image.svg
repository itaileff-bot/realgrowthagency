<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f8f7ff"/>
      <stop offset="50%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#fff5f5"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6C3CE9"/>
      <stop offset="50%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#FFB347"/>
    </linearGradient>
    <radialGradient id="blob1" cx="0.85" cy="0.15" r="0.4">
      <stop offset="0%" stop-color="#6C3CE9" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6C3CE9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="0.1" cy="0.9" r="0.4">
      <stop offset="0%" stop-color="#FF6B6B" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FF6B6B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#blob1)"/>
  <rect width="1200" height="630" fill="url(#blob2)"/>

  <!-- Logo mark -->
  <g transform="translate(96, 96)">
    <rect width="96" height="96" rx="22" fill="url(#grad)"/>
    <text x="48" y="64" text-anchor="middle"
          font-family="'Space Grotesk', system-ui, sans-serif"
          font-size="48" font-weight="700" fill="#fff" letter-spacing="-1">RG</text>
  </g>
  <text x="216" y="160" font-family="'Space Grotesk', system-ui, sans-serif"
        font-size="32" font-weight="700" fill="#1a1a2e">Real Growth Agency</text>

  <!-- Headline -->
  <text x="96" y="340" font-family="'Space Grotesk', system-ui, sans-serif"
        font-size="84" font-weight="900" fill="#1a1a2e">We Build Brands</text>
  <text x="96" y="436" font-family="'Space Grotesk', system-ui, sans-serif"
        font-size="84" font-weight="900" fill="url(#grad)">That Actually Grow</text>

  <!-- Subline -->
  <text x="96" y="510" font-family="'Inter', system-ui, sans-serif"
        font-size="28" font-weight="500" fill="#555">Brand · Web · Marketing · SEO · AI Growth</text>

  <!-- Footer URL -->
  <text x="96" y="580" font-family="'Inter', system-ui, sans-serif"
        font-size="22" font-weight="600" fill="#6C3CE9">realgrowthagency.com</text>
</svg>
